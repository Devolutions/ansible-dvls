---
- name: Fetch DVLS
  hosts: localhost
  vars_files:
    - secrets.yml
  tasks:
    - name: Fetch dvls
      devolutions.dvls.fetch_server:
        server_base_url: "https://dvls-ops.devolutions.com"
        app_key: "{{ lookup('env', 'DVLS_APP_KEY') }}"
        app_secret: "{{ lookup('env', 'DVLS_APP_SECRET') }}"
      register: server

    - name: Print DVLS
      debug:
        var: server

    - name: Fetch dvls
      debug:
        msg: "{{ server.accessURI }}"

    - name: Fetch vaults
      debug:
        msg: "{{ server.vaults[1].id }}"

    - name: Fetch all secrets
      devolutions.dvls.fetch_secrets:
        server_base_url: "{{ server.accessURI }}"
        app_key: "{{ lookup('env', 'DVLS_APP_KEY') }}"
        app_secret: "{{ lookup('env', 'DVLS_APP_SECRET') }}"
        vault_id: "{{ server.vaults[1].id }}"

    - name: Fetch secrets using file
      devolutions.dvls.fetch_secrets:
        server_base_url: "{{ server.accessURI }}"
        app_key: "{{ lookup('env', 'DVLS_APP_KEY') }}"
        app_secret: "{{ lookup('env', 'DVLS_APP_SECRET') }}"
        vault_id: "{{ server.vaults[1].id }}"
        secrets: "{{ secrets }}"

    - name: Get secret from ID
      devolutions.dvls.fetch_secrets:
        server_base_url: "{{ server.accessURI }}"
        app_key: "{{ lookup('env', 'DVLS_APP_KEY') }}"
        app_secret: "{{ lookup('env', 'DVLS_APP_SECRET') }}"
        vault_id: "{{ server.vaults[1].id }}"
        secrets:
          - secret_id: d08fdfa0-6b9b-41a5-8ce0-642ca9c1c4f9

    - name: Get secret from name
      devolutions.dvls.fetch_secrets:
        server_base_url: "{{ server.accessURI }}"
        app_key: "{{ lookup('env', 'DVLS_APP_KEY') }}"
        app_secret: "{{ lookup('env', 'DVLS_APP_SECRET') }}"
        vault_id: "{{ server.vaults[1].id }}"
        secrets:
          - secret_name: AzureSP

    - name: Get secret from Folder
      devolutions.dvls.fetch_secrets:
        server_base_url: "{{ server.accessURI }}"
        app_key: "{{ lookup('env', 'DVLS_APP_KEY') }}"
        app_secret: "{{ lookup('env', 'DVLS_APP_SECRET') }}"
        vault_id: "{{ server.vaults[1].id }}"
        secrets:
          - secret_path: Folder

    - name: Get secret from Tag
      devolutions.dvls.fetch_secrets:
        server_base_url: "{{ server.accessURI }}"
        app_key: "{{ lookup('env', 'DVLS_APP_KEY') }}"
        app_secret: "{{ lookup('env', 'DVLS_APP_SECRET') }}"
        vault_id: "{{ server.vaults[1].id }}"
        secrets:
          - secret_tag: tag

    - name: Get secret from Type
      devolutions.dvls.fetch_secrets:
        server_base_url: "{{ server.accessURI }}"
        app_key: "{{ lookup('env', 'DVLS_APP_KEY') }}"
        app_secret: "{{ lookup('env', 'DVLS_APP_SECRET') }}"
        vault_id: "{{ server.vaults[1].id }}"
        secrets:
          - secret_type: Credential
