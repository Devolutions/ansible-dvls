---
- name: Integration Test for DVLS Modules
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Run fetch_server module
      fetch_server:
        server_base_url: "https://dvls-ops.devolutions.com"
        app_key: "{{ lookup('env', 'DVLS_APP_KEY') }}"
        app_secret: "{{ lookup('env', 'DVLS_APP_SECRET') }}"
      register: server

    - name: Assert fetch_server did not fail
      assert:
        that:
          - server is defined
          - server.failed | default(false) == false

    - name: Run fetch_secrets module for all secrets
      fetch_secrets:
        server_base_url: "{{ server.accessURI }}"
        app_key: "{{ lookup('env', 'DVLS_APP_KEY') }}"
        app_secret: "{{ lookup('env', 'DVLS_APP_SECRET') }}"
        vault_id: "{{ server.vaults[1].id }}"
      register: all_secrets

    - name: Assert fetch_secrets did not fail
      assert:
        that:
          - all_secrets is defined
          - all_secrets.failed | default(false) == false
